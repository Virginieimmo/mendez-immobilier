<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message envoyé — Virginie MENDEZ Immobilier</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #101828;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(161,127,72,0.35);
            border-radius: 20px;
            padding: 60px 48px;
            max-width: 520px;
            width: 100%;
        }
        .icon { font-size: 3.5rem; margin-bottom: 24px; display: block; }
        h1 { font-size: 1.8rem; color: #c9a96e; margin-bottom: 16px; font-weight: 700; }
        p { font-size: 0.95rem; color: rgba(255,255,255,0.65); line-height: 1.8; margin-bottom: 12px; }
        .btn {
            display: inline-block; margin-top: 32px;
            background: #a17f48; color: #fff;
            padding: 14px 32px; border-radius: 6px;
            text-decoration: none; font-weight: 700;
            font-size: 0.9rem; transition: background 0.2s;
        }
        .btn:hover { background: #c9a96e; }
        .phone { color: #c9a96e; font-size: 1.2rem; font-weight: 700; display: block; margin: 20px 0 8px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">✅</span>
        <h1>Message bien reçu !</h1>
        <p>Merci pour votre demande. Je vous répondrai personnellement <strong style="color:rgba(255,255,255,0.85)">dans les 24 heures</strong>.</p>
        <p>Si votre demande est urgente, n'hésitez pas à m'appeler directement :</p>
        <a href="tel:0625823155" class="phone">📞 06 25 82 31 55</a>
        <p style="font-size:0.8rem;color:rgba(255,255,255,0.35)">Lun – Sam · 9h à 19h</p>
        <a href="/" class="btn">← Retour au site</a>
    </div>
</body>
</html>
